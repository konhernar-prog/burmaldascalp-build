name: build-macos

# Собирает ZoVscalpick.app на маке GitHub (PyInstaller не кросс-компилирует,
# поэтому Mac-версию можно собрать только на macOS-раннере).
# Запуск: вручную (Actions -> build-macos -> Run workflow) или при push в main.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "rebuild/**"
      - ".github/workflows/build-macos.yml"

jobs:
  build:
    # macos-13 = Intel (x86_64): .app работает и на Intel, и на Apple Silicon (Rosetta).
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r rebuild/requirements-build.txt

      - name: Build .app with PyInstaller
        working-directory: rebuild
        run: |
          pyinstaller ZoVscalpick-mac.spec --noconfirm --clean

      - name: Zip the .app (ditto keeps bundle perms/symlinks)
        working-directory: rebuild/dist
        run: |
          ditto -c -k --sequesterRsrc --keepParent "ZoVscalpick.app" "ZoVscalpick-macOS.zip"
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZoVscalpick-macOS
          path: rebuild/dist/ZoVscalpick-macOS.zip
          if-no-files-found: error
